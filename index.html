<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taça Regional</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--verde:#00C853;--fundo:#0a0a0a;--fundo2:#111;--fundo3:#1a1a1a;--borda:rgba(255,255,255,0.07);--texto:#f0f0f0;--texto2:#777;--futsal:#00C853;--fifa:#4FC3F7;--truco:#CE93D8;--ranking:#FFD54F;--cor:#00C853;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--fundo);color:var(--texto);font-family:'Barlow',sans-serif;min-height:100vh;}

  header{border-bottom:1px solid var(--borda);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--verde);}
  .logo span{color:var(--texto);}
  .ao-vivo-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--verde);text-transform:uppercase;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--verde);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

  .esporte-nav{display:flex;gap:2px;padding:12px 20px 0;overflow-x:auto;border-bottom:1px solid var(--borda);scrollbar-width:none;}
  .esporte-nav::-webkit-scrollbar{display:none;}
  .esporte-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;border:none;background:transparent;color:var(--texto2);cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
  .esporte-btn:hover{color:var(--texto);}
  .esporte-btn.active.e-futsal{color:var(--futsal);border-bottom-color:var(--futsal);}
  .esporte-btn.active.e-fifa{color:var(--fifa);border-bottom-color:var(--fifa);}
  .esporte-btn.active.e-truco{color:var(--truco);border-bottom-color:var(--truco);}
  .esporte-btn.active.e-ranking{color:var(--ranking);border-bottom-color:var(--ranking);}

  .sub-nav{display:flex;gap:4px;padding:12px 20px 0;border-bottom:1px solid var(--borda);}
  .sub-btn{padding:8px 16px;border:none;background:transparent;color:var(--texto2);cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;}
  .sub-btn:hover{color:var(--texto);}
  .sub-btn.active{color:var(--cor);border-bottom-color:var(--cor);}

  .esporte-page{display:none;} .esporte-page.active{display:block;}
  .sub-page{display:none;} .sub-page.active{display:block;}
  .content{padding:20px;max-width:900px;margin:0 auto;}

  .dia-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--texto2);text-transform:uppercase;margin:20px 0 8px;}
  .dia-label:first-child{margin-top:0;}
  .jogo-card{background:var(--fundo2);border:1px solid var(--borda);border-radius:10px;padding:13px 18px;margin-bottom:8px;display:grid;grid-template-columns:88px 1fr 70px;align-items:center;gap:10px;}
  .jogo-card.vivo{border-color:var(--cor);}
  .jogo-meta{font-size:12px;color:var(--texto2);}
  .badge{font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:4px;text-transform:uppercase;display:inline-block;margin-bottom:3px;}
  .badge-vivo{background:rgba(0,200,83,.15);color:var(--verde);}
  .badge-fim{background:rgba(255,255,255,.06);color:var(--texto2);}
  .badge-prox{background:rgba(255,255,255,.04);color:var(--texto2);}
  .jogo-centro{display:flex;align-items:center;justify-content:center;gap:10px;}
  .time-nome{font-size:14px;font-weight:600;text-align:center;flex:1;}
  .placar{font-family:'Bebas Neue',sans-serif;font-size:26px;display:flex;align-items:center;gap:6px;}
  .placar-sep{font-size:14px;color:var(--texto2);}
  .vs{font-size:13px;color:var(--texto2);letter-spacing:2px;}
  .jogo-grupo{text-align:right;font-size:11px;color:var(--texto2);}

  .grupo-label{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--cor);margin:20px 0 8px;}
  .grupo-label:first-child{margin-top:0;}
  table{width:100%;border-collapse:collapse;}
  th{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--texto2);text-transform:uppercase;text-align:center;padding:7px 8px;border-bottom:1px solid var(--borda);}
  th:nth-child(2){text-align:left;}
  td{padding:11px 8px;text-align:center;border-bottom:1px solid var(--borda);font-size:13px;}
  td:nth-child(2){text-align:left;font-weight:600;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.02);}
  .pos-chip{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;}
  .p1{background:rgba(0,200,83,.15);color:var(--verde);}
  .p2{background:rgba(255,255,255,.07);color:#aaa;}
  .p3{background:rgba(255,255,255,.04);color:#666;}
  .pts{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--cor);}
  .sg-pos{color:var(--verde);} .sg-neg{color:#e55;}

  .bracket-wrap{overflow-x:auto;padding-bottom:12px;}
  .bracket{display:flex;gap:32px;min-width:500px;padding:4px 0;}
  .round{display:flex;flex-direction:column;flex:1;}
  .round-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--texto2);margin-bottom:12px;text-align:center;}
  .match{background:var(--fundo2);border:1px solid var(--borda);border-radius:8px;overflow:hidden;margin-bottom:10px;}
  .match-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;font-size:13px;font-weight:600;border-bottom:1px solid var(--borda);}
  .match-row:last-child{border-bottom:none;}
  .match-row.winner{background:rgba(0,200,83,.08);color:var(--cor);}
  .match-gols{font-family:'Bebas Neue',sans-serif;font-size:17px;}

  .ranking-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--ranking);margin-bottom:20px;}
  .pts-ranking{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--ranking);}

  .empty{text-align:center;padding:40px;color:var(--texto2);font-size:14px;}
  .loading{text-align:center;padding:40px;color:var(--texto2);font-size:14px;}
  .spinner{width:24px;height:24px;border:2px solid var(--borda);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .atualizado{text-align:right;font-size:11px;color:var(--texto2);padding:6px 0 0;}
</style>
</head>
<body>

<header>
  <div class="logo">Taça <span>Regional</span></div>
  <div class="ao-vivo-badge"><span class="dot"></span>Ao vivo</div>
</header>

<div class="esporte-nav">
  <button class="esporte-btn active e-futsal" onclick="showEsporte('futsal',this)">⚽ Futsal</button>
  <button class="esporte-btn e-fifa" onclick="showEsporte('fifa',this)">🎮 FIFA</button>
  <button class="esporte-btn e-truco" onclick="showEsporte('truco',this)">🃏 Truco</button>
  <button class="esporte-btn e-ranking" onclick="showEsporte('ranking',this)">🏆 Ranking Geral</button>
</div>

<div class="sub-nav" id="sub-nav">
  <button class="sub-btn active" onclick="showSub('agenda',this)">Agenda</button>
  <button class="sub-btn" onclick="showSub('classif',this)">Classificação</button>
  <button class="sub-btn" onclick="showSub('chave',this)">Chaveamento</button>
</div>

<div id="page-futsal" class="esporte-page active">
  <div id="futsal-agenda" class="sub-page active content"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
  <div id="futsal-classif" class="sub-page content"></div>
  <div id="futsal-chave" class="sub-page content"></div>
</div>
<div id="page-fifa" class="esporte-page">
  <div id="fifa-agenda" class="sub-page active content"></div>
  <div id="fifa-classif" class="sub-page content"></div>
  <div id="fifa-chave" class="sub-page content"></div>
</div>
<div id="page-truco" class="esporte-page">
  <div id="truco-agenda" class="sub-page active content"></div>
  <div id="truco-classif" class="sub-page content"></div>
  <div id="truco-chave" class="sub-page content"></div>
</div>
<div id="page-ranking" class="esporte-page">
  <div class="content">
    <div class="ranking-title">🏆 Ranking Geral</div>
    <div id="ranking-content"><div class="loading"><div class="spinner"></div>Calculando...</div></div>
    <div style="margin-top:16px;font-size:12px;color:var(--texto2)">1º lugar por esporte = 3pts &nbsp;·&nbsp; 2º lugar = 2pts &nbsp;·&nbsp; 3º lugar = 1pt</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'COLE_SUA_URL_AQUI';
const SUPABASE_KEY = 'COLE_SUA_ANON_KEY_AQUI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ESPORTES = ['futsal','fifa','truco'];
const CORES = {futsal:'var(--futsal)',fifa:'var(--fifa)',truco:'var(--truco)'};
let esporteAtivo = 'futsal', subAtiva = 'agenda';

function showEsporte(esp, btn) {
  document.querySelectorAll('.esporte-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.esporte-page').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page-'+esp).classList.add('active');
  document.getElementById('sub-nav').style.display = esp==='ranking' ? 'none' : 'flex';
  if(esp !== 'ranking') document.documentElement.style.setProperty('--cor', CORES[esp]);
  esporteAtivo = esp;
  if(esp==='ranking') renderRanking();
}

function showSub(sub, btn) {
  document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll(`#page-${esporteAtivo} .sub-page`).forEach(p=>p.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById(`${esporteAtivo}-${sub}`).classList.add('active');
  subAtiva = sub;
}

function fmtData(iso) {
  if(!iso) return '';
  return new Date(iso+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});
}
function fmtHora(h){ return h ? h.slice(0,5) : '--:--'; }

function renderAgenda(esp, jogos) {
  const el = document.getElementById(`${esp}-agenda`);
  if(!jogos.length){el.innerHTML='<div class="empty">Nenhum jogo cadastrado ainda.</div>';return;}
  let html='', diaAtual='';
  jogos.forEach(j=>{
    if(j.data!==diaAtual){diaAtual=j.data;html+=`<div class="dia-label">${fmtData(j.data)}</div>`;}
    const badge = j.status==='ao_vivo'?'<span class="badge badge-vivo">Ao vivo</span>'
                : j.status==='encerrado'?'<span class="badge badge-fim">Encerrado</span>'
                : '<span class="badge badge-prox">Agendado</span>';
    const placar = (j.status==='encerrado'||j.status==='ao_vivo')
      ? `<div class="placar"><span>${j.gols_a??0}</span><span class="placar-sep">×</span><span>${j.gols_b??0}</span></div>`
      : '<span class="vs">vs</span>';
    html+=`<div class="jogo-card ${j.status==='ao_vivo'?'vivo':''}">
      <div class="jogo-meta">${badge}<br>${fmtHora(j.hora)}</div>
      <div class="jogo-centro"><span class="time-nome">${j.time_a}</span>${placar}<span class="time-nome">${j.time_b}</span></div>
      <div class="jogo-grupo">Grupo ${j.grupo||''}</div>
    </div>`;
  });
  el.innerHTML=html+`<div class="atualizado">Atualizado às ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>`;
}

function calcClassif(jogos) {
  const times={};
  jogos.filter(j=>j.status==='encerrado'&&j.fase!=='eliminatoria').forEach(j=>{
    [j.time_a,j.time_b].forEach(t=>{if(!times[t])times[t]={nome:t,grupo:j.grupo,pts:0,j:0,v:0,e:0,d:0,gp:0,gc:0};});
    const ta=times[j.time_a],tb=times[j.time_b],ga=j.gols_a??0,gb=j.gols_b??0;
    ta.j++;tb.j++;ta.gp+=ga;ta.gc+=gb;tb.gp+=gb;tb.gc+=ga;
    if(ga>gb){ta.pts+=3;ta.v++;tb.d++;}
    else if(ga===gb){ta.pts++;tb.pts++;ta.e++;tb.e++;}
    else{tb.pts+=3;tb.v++;ta.d++;}
  });
  return times;
}

function renderClassif(esp, jogos) {
  const el=document.getElementById(`${esp}-classif`);
  const times=calcClassif(jogos);
  const grupos={};
  Object.values(times).forEach(t=>{if(!grupos[t.grupo])grupos[t.grupo]=[];grupos[t.grupo].push(t);});
  Object.values(grupos).forEach(g=>g.sort((a,b)=>b.pts-a.pts||(b.gp-b.gc)-(a.gp-a.gc)));
  let html='';
  Object.entries(grupos).sort().forEach(([g,lista])=>{
    html+=`<div class="grupo-label">Grupo ${g}</div><table><thead><tr><th>#</th><th>Time</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>SG</th></tr></thead><tbody>`;
    lista.forEach((t,i)=>{
      const cls=i===0?'p1':i===1?'p2':'p3';
      const sg=t.gp-t.gc;
      html+=`<tr><td><span class="pos-chip ${cls}">${i+1}</span></td><td>${t.nome}</td><td class="pts">${t.pts}</td><td>${t.j}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td><td class="${sg>=0?'sg-pos':'sg-neg'}">${sg>0?'+':''}${sg}</td></tr>`;
    });
    html+='</tbody></table>';
  });
  el.innerHTML=html||'<div class="empty">Nenhum jogo encerrado ainda.</div>';
}

function renderChave(esp, jogos) {
  const el=document.getElementById(`${esp}-chave`);
  const elim=jogos.filter(j=>j.fase==='eliminatoria');
  if(!elim.length){el.innerHTML='<div class="empty">Fase eliminatória ainda não definida.</div>';return;}
  const rodadas={};
  elim.forEach(j=>{if(!rodadas[j.rodada])rodadas[j.rodada]=[];rodadas[j.rodada].push(j);});
  const nomes={semifinal:'Semifinais',final:'Final','3lugar':'3º Lugar'};
  let html='<div class="bracket-wrap"><div class="bracket">';
  ['semifinal','3lugar','final'].filter(r=>rodadas[r]).forEach(r=>{
    html+=`<div class="round"><div class="round-label">${nomes[r]}</div>`;
    rodadas[r].forEach(j=>{
      const enc=j.status==='encerrado';
      html+=`<div class="match">
        <div class="match-row ${enc&&j.gols_a>j.gols_b?'winner':''}"><span>${j.time_a||'?'}</span><span class="match-gols">${enc?j.gols_a:'-'}</span></div>
        <div class="match-row ${enc&&j.gols_b>j.gols_a?'winner':''}"><span>${j.time_b||'?'}</span><span class="match-gols">${enc?j.gols_b:'-'}</span></div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div></div>';
  el.innerHTML=html;
}

async function renderRanking() {
  const el=document.getElementById('ranking-content');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Calculando...</div>';
  const {data:jogos}=await sb.from('jogos').select('*').eq('status','encerrado');
  const {data:timesDB}=await sb.from('times').select('*');
  if(!jogos||!timesDB){el.innerHTML='<div class="empty">Erro ao carregar.</div>';return;}
  const pontos={};
  timesDB.forEach(t=>{pontos[t.nome]={futsal:0,fifa:0,truco:0,total:0};});
  ESPORTES.forEach(esp=>{
    const jogosEsp=jogos.filter(j=>j.esporte===esp&&j.fase!=='eliminatoria');
    const timesEsp=calcClassif(jogosEsp);
    Object.values(timesEsp).sort((a,b)=>b.pts-a.pts||(b.gp-b.gc)-(a.gp-a.gc)).forEach((t,i)=>{
      if(!pontos[t.nome])pontos[t.nome]={futsal:0,fifa:0,truco:0,total:0};
      const val=i===0?3:i===1?2:i===2?1:0;
      pontos[t.nome][esp]=val;
      pontos[t.nome].total+=val;
    });
  });
  const ranking=Object.entries(pontos).sort((a,b)=>b[1].total-a[1].total);
  const medalhas=['🥇','🥈','🥉'];
  let html=`<table><thead><tr><th>#</th><th>Time</th><th>⚽</th><th>🎮</th><th>🃏</th><th style="color:var(--ranking)">Total</th></tr></thead><tbody>`;
  ranking.forEach(([nome,p],i)=>{
    html+=`<tr>
      <td>${i<3?medalhas[i]:`<span class="pos-chip p3">${i+1}</span>`}</td>
      <td>${nome}</td>
      <td>${p.futsal||'-'}</td><td>${p.fifa||'-'}</td><td>${p.truco||'-'}</td>
      <td class="pts-ranking">${p.total}</td>
    </tr>`;
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}

async function carregarTudo() {
  const {data:jogos}=await sb.from('jogos').select('*').order('data').order('hora');
  if(!jogos) return;
  ESPORTES.forEach(esp=>{
    const j=jogos.filter(x=>x.esporte===esp);
    renderAgenda(esp,j); renderClassif(esp,j); renderChave(esp,j);
  });
}

sb.channel('rt').on('postgres_changes',{event:'*',schema:'public',table:'jogos'},()=>{
  carregarTudo();
  if(esporteAtivo==='ranking') renderRanking();
}).subscribe();

carregarTudo();
</script>
</body>
</html>
